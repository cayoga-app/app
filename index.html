<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <title>CaYoga</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="apple-touch-icon" href="https://cayoga-app.github.io/app/apple-touch-icon.png?v=2">
  <link rel="icon" type="image/png" href="https://cayoga-app.github.io/app/apple-touch-icon.png?v=2">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="CaYoga">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="CaYoga">
  <meta name="theme-color" content="#ffffff">

  <style>
    :root {
      --brand: #a85a1a;
      --brand-hover: #8f4c15;
      --text: #1f1f1f;
      --muted: #666666;
      --bg: #f7f4f1;
      --card: #ffffff;
      --border: #eadfd4;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background:
        radial-gradient(circle at top, #ffffff 0%, var(--bg) 55%, #efe7df 100%);
      color: var(--text);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 28px;
      padding: 32px 24px;
      text-align: center;
      box-shadow: 0 12px 40px rgba(0,0,0,0.08);
    }

    .logo {
      width: 100px;
      height: 100px;
      object-fit: contain;
      margin: 0 auto 20px;
      display: block;
    }

    p {
      margin-bottom: 24px;
      color: var(--muted);
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 56px;
      padding: 0 24px;
      border-radius: 16px;
      background: var(--brand);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      box-shadow: 0 10px 24px rgba(168, 90, 26, 0.25);
      transition: 0.2s;
    }

    .button:hover {
      background: var(--brand-hover);
      transform: translateY(-1px);
    }

    .splash {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .splash.show {
      display: flex;
      opacity: 1;
    }

    .splash img {
      width: 120px;
      height: 120px;
      animation: fadeIn 0.6s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>

  <script>
    (function () {
      var isStandalone =
        window.navigator.standalone === true ||
        window.matchMedia('(display-mode: standalone)').matches;

      if (isStandalone) {
        window.addEventListener('DOMContentLoaded', function () {
          var splash = document.getElementById('splash');
          if (splash) splash.classList.add('show');

          setTimeout(function () {
            window.location.replace('https://cayoga.it/corsi');
          }, 900);
        });
      }
    })();
  </script>
</head>

<body>
  <div id="splash" class="splash">
    <img src="https://cayoga-app.github.io/app/apple-touch-icon.png?v=2" alt="CaYoga">
  </div>

  <main class="card">
    <img class="logo" src="https://cayoga-app.github.io/app/apple-touch-icon.png?v=2" alt="CaYoga">
    <p>Accedi rapidamente ai tuoi corsi</p>
    <a class="button" href="https://cayoga.it/corsi">
      VAI AI CORSI
    </a>
  </main>
</body>
</html>
